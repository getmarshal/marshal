{% extends "main::layout" %}

{% block breadcrumb %}
<ol class="breadcrumb breadcrumb-arrow">
    <li class="breadcrumb-item"><a href="{{ path('marshal::home') }}">Home</a></li>
    <li class="breadcrumb-item breadcrumb-current" aria-current="page">Apps</li>
</ol>
{% endblock %}

{% block main %}
<main class="container-lg">
    <div class="section">
        <h1>Apps</h1>
        {% for app in apps %}
        <div>
        	<a href="{{ path('marshal::app-dashboard', {app: app.tag}) }}">{{ app.label }}</a>
        </div>
        {% endfor %}
    </div>
</main>
{% endblock %}
