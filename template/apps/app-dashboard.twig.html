{% extends "main::layout" %}

{% block breadcrumb %}
<ol class="breadcrumb breadcrumb-arrow">
    <li class="breadcrumb-item"><a href="{{ path('marshal::home') }}">Home</a></li>
    <li class="breadcrumb-item"><a href="{{ path('marshal::apps-dashboard') }}">Apps</a></li>
    <li class="breadcrumb-item breadcrumb-current" aria-current="page">{{ app.label }}</li>
</ol>
{% endblock %}

{% block main %}
<main class="container-lg">
    <div class="section">
        <h1>{{ app.label }}</h1>
        {% for tag, type in types %}
        <div>
        	<a href="{{ path('marshal::app-content-type', {'app': app.tag, 'type': type.tag}) }}">{{ type.name }}</a>
        	<small>{{ type.description }}</small>
        </div>
        {% endfor %}
    </div>
</main>
{% endblock %}
